{% extends "base.html" %}

{% block sidebar %}
<div class="space-y-4">
    <h2 class="text-lg font-bold text-gray-800 dark:text-gray-200">エリア画像置換</h2>
    <p class="text-sm text-gray-600 dark:text-gray-400">エリアを選択して画像を置換します。</p>

    <!-- Page selector (populated dynamically) -->
    <div>
        <label for="area-page-select" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">対象ページ</label>
        <select id="area-page-select"
                class="w-full px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200"
                onchange="loadPageForSelection()">
        </select>
    </div>

    <!-- Upload replacement image (local only) -->
    <div>
        <label for="replacement-image-input" class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">置換画像</label>
        <input type="file" id="replacement-image-input" name="image" accept="image/*"
               class="w-full text-xs text-gray-500 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-medium file:bg-navy-50 file:text-navy-700 hover:file:bg-navy-100 dark:file:bg-navy-900 dark:file:text-navy-300"
               onchange="handleImageUpload(this)" />
        <div id="replace-image-status" class="mt-2"></div>
    </div>

    <!-- Selection coordinates (auto-filled by canvas) -->
    <fieldset class="space-y-2">
        <legend class="block text-xs font-medium text-gray-700 dark:text-gray-300">選択エリア</legend>
        <div class="grid grid-cols-2 gap-2">
            <div>
                <label for="sel-x" class="text-xs text-gray-500">X</label>
                <input type="number" id="sel-x" value="0" class="w-full px-2 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200" />
            </div>
            <div>
                <label for="sel-y" class="text-xs text-gray-500">Y</label>
                <input type="number" id="sel-y" value="0" class="w-full px-2 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200" />
            </div>
            <div>
                <label for="sel-w" class="text-xs text-gray-500">幅</label>
                <input type="number" id="sel-w" value="0" class="w-full px-2 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200" />
            </div>
            <div>
                <label for="sel-h" class="text-xs text-gray-500">高さ</label>
                <input type="number" id="sel-h" value="0" class="w-full px-2 py-1 text-xs rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200" />
            </div>
        </div>
    </fieldset>

    <!-- Keep aspect ratio -->
    <label for="keep-aspect" class="flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
        <input type="checkbox" id="keep-aspect" class="rounded border-gray-300" />
        <span>アスペクト比を維持</span>
    </label>

    <!-- Execute replacement -->
    <button onclick="executeReplace()"
            aria-label="選択エリアをアップロード画像で置換"
            class="w-full px-4 py-3 bg-gold-500 hover:bg-gold-600 text-white rounded-lg font-semibold text-sm transition-colors">
        エリアを置換
    </button>

    <div id="area-replace-result" class="mt-2" aria-live="polite"></div>

    <!-- Navigation -->
    <hr class="border-gray-200 dark:border-gray-700" />
    <a href="#" id="back-editor-link"
       class="block text-center text-sm text-navy-500 hover:text-navy-600 dark:text-navy-400">
        &larr; エディタに戻る
    </a>
</div>
{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-200 mb-4">エリア画像置換</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">ページ上で矩形を描画して置換エリアを選択してください。</p>

    <!-- Canvas container -->
    <div class="relative inline-block border-2 border-gray-300 dark:border-gray-600 rounded-lg overflow-auto bg-white shadow-lg w-full" style="-webkit-overflow-scrolling: touch;">
        <canvas id="area-canvas" class="cursor-crosshair" style="max-width: 100%; height: auto;" role="img" aria-label="エリア選択用ページプレビューキャンバス。矩形を描画して置換エリアを選択してください。"></canvas>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentFileId = null;
let canvasEl, ctx;
let renderScale = 1.5;
let pageWidth = 0, pageHeight = 0;
let isDrawing = false;
let startX = 0, startY = 0, rectX = 0, rectY = 0, rectW = 0, rectH = 0;

// Replacement image stored locally (no server upload)
let replacementImageBytes = null;
let replacementImageType = null;
let replacementImageName = null;

document.addEventListener('DOMContentLoaded', async () => {
    canvasEl = document.getElementById('area-canvas');
    ctx = canvasEl.getContext('2d');

    // Load PDF from IndexedDB
    const params = new URLSearchParams(window.location.search);
    currentFileId = parseInt(params.get('fileId'));
    if (!currentFileId) { window.location.href = '/'; return; }

    const file = await PdfStorage.getFile(currentFileId);
    if (!file) { window.location.href = '/'; return; }

    await PdfEngine.loadFromBytes(file.bytes, file.name);

    // Update back link
    document.getElementById('back-editor-link').href = `/editor?fileId=${currentFileId}`;

    // Populate page selector
    const select = document.getElementById('area-page-select');
    const pageCount = PdfEngine.getPageCount();
    for (let i = 1; i <= pageCount; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `ページ ${i}`;
        select.appendChild(opt);
    }

    // Set up canvas event listeners
    setupCanvasEvents();

    // Render first page
    loadPageForSelection();
});

/**
 * Render the selected page to the canvas using PdfEngine
 */
async function loadPageForSelection() {
    const pageNum = parseInt(document.getElementById('area-page-select').value);
    if (!pageNum || !PdfEngine.isLoaded()) return;

    // Get page dimensions at scale 1.0 for PDF coordinate mapping
    const size = await PdfEngine.getPageSize(pageNum);
    pageWidth = size.width;
    pageHeight = size.height;

    // Render at higher scale for better visual quality
    await PdfEngine.renderPage(pageNum, canvasEl, renderScale);

    // Reset selection
    rectX = 0; rectY = 0; rectW = 0; rectH = 0;
    updateCoords();
}

/**
 * Redraw the canvas with the current page and selection overlay
 */
async function redrawWithOverlay() {
    const pageNum = parseInt(document.getElementById('area-page-select').value);
    if (!pageNum || !PdfEngine.isLoaded()) return;

    await PdfEngine.renderPage(pageNum, canvasEl, renderScale);

    if (rectW > 0 && rectH > 0) {
        ctx.strokeStyle = '#EF4444';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 3]);
        ctx.strokeRect(rectX, rectY, rectW, rectH);
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(239, 68, 68, 0.15)';
        ctx.fillRect(rectX, rectY, rectW, rectH);
    }
}

/**
 * Set up mouse and touch event listeners on the canvas
 */
function setupCanvasEvents() {
    // Mouse events
    canvasEl.addEventListener('mousedown', function(e) {
        const r = canvasEl.getBoundingClientRect();
        const scaleX = canvasEl.width / r.width;
        const scaleY = canvasEl.height / r.height;
        startX = (e.clientX - r.left) * scaleX;
        startY = (e.clientY - r.top) * scaleY;
        isDrawing = true;
    });

    canvasEl.addEventListener('mousemove', function(e) {
        if (!isDrawing) return;
        const r = canvasEl.getBoundingClientRect();
        const scaleX = canvasEl.width / r.width;
        const scaleY = canvasEl.height / r.height;
        const curX = (e.clientX - r.left) * scaleX;
        const curY = (e.clientY - r.top) * scaleY;
        rectX = Math.min(startX, curX);
        rectY = Math.min(startY, curY);
        rectW = Math.abs(curX - startX);
        rectH = Math.abs(curY - startY);
        redrawWithOverlay();
        updateCoords();
    });

    canvasEl.addEventListener('mouseup', function() {
        isDrawing = false;
    });

    // Touch support for mobile devices
    canvasEl.addEventListener('touchstart', function(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const r = canvasEl.getBoundingClientRect();
        const scaleX = canvasEl.width / r.width;
        const scaleY = canvasEl.height / r.height;
        startX = (touch.clientX - r.left) * scaleX;
        startY = (touch.clientY - r.top) * scaleY;
        isDrawing = true;
    }, { passive: false });

    canvasEl.addEventListener('touchmove', function(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const touch = e.touches[0];
        const r = canvasEl.getBoundingClientRect();
        const scaleX = canvasEl.width / r.width;
        const scaleY = canvasEl.height / r.height;
        const curX = (touch.clientX - r.left) * scaleX;
        const curY = (touch.clientY - r.top) * scaleY;
        rectX = Math.min(startX, curX);
        rectY = Math.min(startY, curY);
        rectW = Math.abs(curX - startX);
        rectH = Math.abs(curY - startY);
        redrawWithOverlay();
        updateCoords();
    }, { passive: false });

    canvasEl.addEventListener('touchend', function(e) {
        e.preventDefault();
        isDrawing = false;
    }, { passive: false });
}

function updateCoords() {
    // Display coordinates in PDF space (scale 1.0), not canvas space
    document.getElementById('sel-x').value = Math.round(rectX / renderScale);
    document.getElementById('sel-y').value = Math.round(rectY / renderScale);
    document.getElementById('sel-w').value = Math.round(rectW / renderScale);
    document.getElementById('sel-h').value = Math.round(rectH / renderScale);
}

/**
 * Handle image upload locally - store bytes in a variable, no server call
 */
function handleImageUpload(input) {
    const file = input.files[0];
    const statusEl = document.getElementById('replace-image-status');
    if (!file) {
        replacementImageBytes = null;
        replacementImageType = null;
        replacementImageName = null;
        statusEl.innerHTML = '';
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        replacementImageBytes = new Uint8Array(e.target.result);
        replacementImageName = file.name;

        // Determine image type from file
        const lowerName = file.name.toLowerCase();
        if (lowerName.endsWith('.png')) {
            replacementImageType = 'png';
        } else if (lowerName.endsWith('.jpg') || lowerName.endsWith('.jpeg')) {
            replacementImageType = 'jpg';
        } else if (file.type === 'image/png') {
            replacementImageType = 'png';
        } else {
            // Default to jpg for other image types
            replacementImageType = 'jpg';
        }

        statusEl.innerHTML = `<span class="text-xs text-green-600 dark:text-green-400 flex items-center gap-1">
            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
            ${file.name} (${(file.size / 1024).toFixed(1)} KB)
        </span>`;
    };
    reader.readAsArrayBuffer(file);
}

/**
 * Execute the area replacement using PdfEngine.addImage() - fully client-side
 */
async function executeReplace() {
    const resultEl = document.getElementById('area-replace-result');

    if (!replacementImageBytes) {
        resultEl.innerHTML = '<p class="text-sm text-red-500">置換画像をアップロードしてください。</p>';
        return;
    }

    const pdfX = parseInt(document.getElementById('sel-x').value);
    const pdfY = parseInt(document.getElementById('sel-y').value);
    const pdfW = parseInt(document.getElementById('sel-w').value);
    const pdfH = parseInt(document.getElementById('sel-h').value);

    if (pdfW <= 0 || pdfH <= 0) {
        resultEl.innerHTML = '<p class="text-sm text-red-500">キャンバス上で選択矩形を描画してください。</p>';
        return;
    }

    const pageNum = parseInt(document.getElementById('area-page-select').value);
    const keepAspect = document.getElementById('keep-aspect').checked;

    try {
        resultEl.innerHTML = '<p class="text-sm text-gray-500">置換中...</p>';

        // pdf-lib uses bottom-left origin; canvas uses top-left origin.
        // Convert canvas Y (top-down) to PDF Y (bottom-up).
        let imgWidth = pdfW;
        let imgHeight = pdfH;

        if (keepAspect && replacementImageBytes) {
            // Load image to get natural dimensions for aspect ratio
            const blob = new Blob([replacementImageBytes]);
            const imgUrl = URL.createObjectURL(blob);
            const tempImg = new Image();
            await new Promise((resolve, reject) => {
                tempImg.onload = resolve;
                tempImg.onerror = reject;
                tempImg.src = imgUrl;
            });
            URL.revokeObjectURL(imgUrl);

            const naturalRatio = tempImg.naturalWidth / tempImg.naturalHeight;
            const selectionRatio = pdfW / pdfH;

            if (naturalRatio > selectionRatio) {
                // Image is wider: fit to width, adjust height
                imgHeight = pdfW / naturalRatio;
            } else {
                // Image is taller: fit to height, adjust width
                imgWidth = pdfH * naturalRatio;
            }
        }

        // Convert from top-left origin (canvas) to bottom-left origin (PDF)
        const pdfYBottomUp = pageHeight - pdfY - imgHeight;

        await PdfEngine.addImage(pageNum, replacementImageBytes, replacementImageType, {
            x: pdfX,
            y: pdfYBottomUp,
            width: imgWidth,
            height: imgHeight,
        });

        // Save updated PDF back to IndexedDB
        await PdfStorage.updateFile(currentFileId, PdfEngine.getCurrentBytes());

        resultEl.innerHTML = '<p class="text-sm text-green-600 dark:text-green-400">エリア置換完了。</p>';

        // Re-render the page to show the change
        await loadPageForSelection();

        if (typeof EditorUI !== 'undefined') {
            EditorUI.showToast('エリア置換完了', 'success');
        }
    } catch (err) {
        console.error('Area replace error:', err);
        resultEl.innerHTML = `<p class="text-sm text-red-500">エラー: ${err.message}</p>`;
    }
}
</script>
{% endblock %}
