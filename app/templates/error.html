{% extends "base.html" %}

{% block sidebar %}
<div class="p-4">
    <a href="/" class="block text-center px-4 py-3 bg-navy-600 hover:bg-navy-700 text-white rounded-lg font-medium transition-colors">
        Home
    </a>
</div>
{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="text-center">
        <h1 class="text-6xl font-bold text-gray-300 dark:text-gray-600 mb-4">{{ status_code }}</h1>
        <h2 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">{{ title }}</h2>
        <p class="text-gray-500 dark:text-gray-400 mb-8">{{ message }}</p>
        <a href="/" class="inline-block px-6 py-3 bg-navy-600 hover:bg-navy-700 text-white rounded-lg font-medium transition-colors">
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
