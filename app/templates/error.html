<!DOCTYPE html>
<html lang="ja"
      x-data="{ darkMode: localStorage.getItem('dark') === 'true' }"
      :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ status_code }} - PDF Workshop Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        navy: {
                            DEFAULT: '#1C3058',
                            600: '#162848',
                            700: '#0F1E38',
                            800: '#0A1528',
                        },
                        gold: {
                            DEFAULT: '#CFAE70',
                            400: '#D9BE88',
                            600: '#B8944E',
                        },
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .float-anim { animation: float 4s ease-in-out infinite; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.6s ease-out forwards; }
        .fade-in-delay { animation: fadeInUp 0.6s 0.15s ease-out forwards; opacity: 0; }
        .fade-in-delay-2 { animation: fadeInUp 0.6s 0.3s ease-out forwards; opacity: 0; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col transition-colors duration-300">

    <!-- Header -->
    <header class="bg-navy dark:bg-navy-800 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <svg class="w-7 h-7 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                </svg>
                <span class="text-lg font-bold">PDF Workshop Pro</span>
            </a>
            <button @click="darkMode = !darkMode; localStorage.setItem('dark', darkMode)"
                    class="p-2 rounded-lg hover:bg-white/10 transition-colors"
                    :title="darkMode ? 'ライトモード' : 'ダークモード'">
                <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>
                <svg x-show="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Main content -->
    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="max-w-lg w-full text-center">

            <!-- SVG Illustration -->
            <div class="mb-8 flex justify-center float-anim">
                {% if status_code == 404 %}
                <!-- Torn PDF document -->
                <svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-lg">
                    <!-- Left half of torn page -->
                    <path d="M32 20 L32 85 L42 80 L50 88 L58 78 L66 86 L74 80 L80 85 L80 20 L68 20 L68 8 L32 8 Z" class="fill-white dark:fill-gray-700" stroke="#1C3058" stroke-width="2"/>
                    <path d="M68 8 L68 20 L80 20 Z" class="fill-gray-200 dark:fill-gray-600" stroke="#1C3058" stroke-width="2"/>
                    <!-- Text lines on left half -->
                    <rect x="40" y="30" width="28" height="3" rx="1.5" class="fill-gray-300 dark:fill-gray-500"/>
                    <rect x="40" y="38" width="20" height="3" rx="1.5" class="fill-gray-300 dark:fill-gray-500"/>
                    <rect x="40" y="46" width="32" height="3" rx="1.5" class="fill-gray-300 dark:fill-gray-500"/>
                    <rect x="40" y="54" width="16" height="3" rx="1.5" class="fill-gray-300 dark:fill-gray-500"/>
                    <rect x="40" y="62" width="24" height="3" rx="1.5" class="fill-gray-300 dark:fill-gray-500"/>
                    <!-- "PDF" label -->
                    <rect x="40" y="70" width="24" height="10" rx="2" fill="#CFAE70"/>
                    <text x="52" y="78" text-anchor="middle" font-size="7" font-weight="bold" fill="#1C3058">PDF</text>
                    <!-- Right half of torn page (rotated slightly) -->
                    <g transform="translate(6, 8) rotate(6, 110, 90)">
                        <path d="M80 85 L88 78 L96 86 L104 80 L112 88 L120 80 L128 85 L128 152 L80 152 Z" class="fill-white dark:fill-gray-700" stroke="#1C3058" stroke-width="2"/>
                        <rect x="88" y="96" width="28" height="3" rx="1.5" class="fill-gray-300 dark:fill-gray-500"/>
                        <rect x="88" y="104" width="20" height="3" rx="1.5" class="fill-gray-300 dark:fill-gray-500"/>
                        <rect x="88" y="112" width="32" height="3" rx="1.5" class="fill-gray-300 dark:fill-gray-500"/>
                        <rect x="88" y="120" width="16" height="3" rx="1.5" class="fill-gray-300 dark:fill-gray-500"/>
                        <rect x="88" y="128" width="24" height="3" rx="1.5" class="fill-gray-300 dark:fill-gray-500"/>
                    </g>
                    <!-- Question mark -->
                    <circle cx="120" cy="36" r="20" fill="#CFAE70" opacity="0.15"/>
                    <text x="120" y="44" text-anchor="middle" font-size="28" font-weight="bold" fill="#CFAE70">?</text>
                </svg>
                {% else %}
                <!-- Gear with wrench -->
                <svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" class="drop-shadow-lg">
                    <!-- Large gear -->
                    <g transform="translate(80, 80)">
                        <path d="M0,-42 L6,-36 L10,-40 L16,-34 L12,-28 L18,-24 L18,-18 L24,-16 L24,-8 L30,-6 L28,0 L34,4 L30,10 L34,16 L28,18 L28,24 L22,28 L18,24 L12,28 L14,34 L8,36 L4,30 L-2,32 L-6,28 L-12,32 L-14,26 L-20,28 L-22,22 L-28,20 L-26,14 L-32,10 L-28,4 L-32,-2 L-26,-4 L-26,-10 L-32,-14 L-28,-20 L-22,-18 L-18,-24 L-22,-30 L-16,-32 L-12,-28 L-6,-34 L-8,-40 L-2,-38 Z"
                              class="fill-navy dark:fill-navy-600" opacity="0.8"/>
                        <circle cx="0" cy="0" r="16" class="fill-gray-50 dark:fill-gray-900"/>
                        <circle cx="0" cy="0" r="12" class="fill-navy dark:fill-navy-700" opacity="0.3"/>
                    </g>
                    <!-- Warning triangle -->
                    <g transform="translate(80, 76)">
                        <path d="M0,-14 L16,12 L-16,12 Z" fill="#CFAE70" stroke="#B8944E" stroke-width="1.5"/>
                        <text x="0" y="9" text-anchor="middle" font-size="16" font-weight="bold" fill="#1C3058">!</text>
                    </g>
                    <!-- Wrench -->
                    <g transform="translate(115, 115) rotate(-45)">
                        <rect x="-4" y="-30" width="8" height="36" rx="2" class="fill-gray-400 dark:fill-gray-500"/>
                        <path d="M-8,-30 C-8,-38 8,-38 8,-30 L4,-24 L-4,-24 Z" class="fill-gray-400 dark:fill-gray-500"/>
                        <circle cx="0" cy="-32" r="3" class="fill-gray-50 dark:fill-gray-900"/>
                    </g>
                    <!-- Sparks -->
                    <circle cx="44" cy="44" r="3" fill="#CFAE70" opacity="0.6"/>
                    <circle cx="130" cy="50" r="2" fill="#CFAE70" opacity="0.4"/>
                    <circle cx="50" cy="130" r="2.5" fill="#CFAE70" opacity="0.5"/>
                </svg>
                {% endif %}
            </div>

            <!-- Status code -->
            <h1 class="fade-in text-8xl sm:text-9xl font-black mb-4 bg-gradient-to-r from-navy dark:from-gray-200 to-gold bg-clip-text text-transparent leading-tight">
                {{ status_code }}
            </h1>

            <!-- Title -->
            <h2 class="fade-in-delay text-xl sm:text-2xl font-bold text-gray-800 dark:text-gray-100 mb-2">
                {{ title }}
            </h2>

            <!-- Message -->
            <p class="fade-in-delay text-gray-500 dark:text-gray-400 mb-8">
                {{ message }}
            </p>

            <!-- Action buttons -->
            <div class="fade-in-delay-2 flex flex-col sm:flex-row items-center justify-center gap-3 mb-10">
                {% if status_code == 500 %}
                <button onclick="location.reload()"
                        class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-6 py-3 bg-gold hover:bg-gold-600 text-navy font-semibold rounded-lg shadow-md hover:shadow-lg transition-all duration-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />
                    </svg>
                    再読み込み
                </button>
                {% endif %}
                <a href="/"
                   class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-6 py-3 {% if status_code == 500 %}bg-navy hover:bg-navy-700 text-white{% else %}bg-gold hover:bg-gold-600 text-navy{% endif %} font-semibold rounded-lg shadow-md hover:shadow-lg transition-all duration-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                    </svg>
                    ホームに戻る
                </a>
            </div>

            {% if status_code == 404 %}
            <!-- Helpful navigation links -->
            <div class="fade-in-delay-2 border-t border-gray-200 dark:border-gray-700 pt-8">
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">お探しのページはこちらですか？</p>
                <div class="grid grid-cols-2 gap-3 max-w-sm mx-auto">
                    <a href="/" class="flex items-center gap-2 px-4 py-2.5 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:border-gold dark:hover:border-gold text-gray-700 dark:text-gray-300 text-sm font-medium transition-colors shadow-sm hover:shadow">
                        <svg class="w-4 h-4 text-gold flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                        </svg>
                        ホーム
                    </a>
                    <a href="/editor" class="flex items-center gap-2 px-4 py-2.5 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:border-gold dark:hover:border-gold text-gray-700 dark:text-gray-300 text-sm font-medium transition-colors shadow-sm hover:shadow">
                        <svg class="w-4 h-4 text-gold flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Z" />
                        </svg>
                        エディター
                    </a>
                    <a href="/merge" class="flex items-center gap-2 px-4 py-2.5 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:border-gold dark:hover:border-gold text-gray-700 dark:text-gray-300 text-sm font-medium transition-colors shadow-sm hover:shadow">
                        <svg class="w-4 h-4 text-gold flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5" />
                        </svg>
                        マージ
                    </a>
                    <a href="/ai-workshop" class="flex items-center gap-2 px-4 py-2.5 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:border-gold dark:hover:border-gold text-gray-700 dark:text-gray-300 text-sm font-medium transition-colors shadow-sm hover:shadow">
                        <svg class="w-4 h-4 text-gold flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
                        </svg>
                        AI工房
                    </a>
                </div>
            </div>
            {% endif %}

        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-4 text-xs text-gray-400 dark:text-gray-600">
        PDF Workshop Pro
    </footer>

</body>
</html>
