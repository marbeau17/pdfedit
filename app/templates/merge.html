{% extends "base.html" %}

{% block sidebar %}
<div class="space-y-4">
    <h2 class="text-lg font-bold text-gray-800 dark:text-gray-200">PDF Merge</h2>
    <p class="text-sm text-gray-600 dark:text-gray-400">Upload multiple PDFs and merge them in your desired order.</p>

    <!-- Upload multiple files -->
    <form hx-post="/api/merge/upload"
          hx-target="#merge-files"
          hx-swap="innerHTML"
          hx-encoding="multipart/form-data"
          hx-indicator="#loading"
          class="space-y-3">
        <div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-6 text-center hover:border-gold-500 transition-colors cursor-pointer"
             x-data="{ dragOver: false, fileCount: 0 }"
             @dragover.prevent="dragOver = true"
             @dragleave="dragOver = false"
             @drop.prevent="dragOver = false; $refs.mergeInput.files = $event.dataTransfer.files; fileCount = $event.dataTransfer.files.length; $el.closest('form').requestSubmit()"
             :class="{ 'border-gold-500 bg-gold-50 dark:bg-gold-900/20': dragOver }">
            <input type="file" name="pdfs" accept=".pdf" multiple x-ref="mergeInput" class="hidden"
                   @change="fileCount = $el.files.length; $el.closest('form').requestSubmit()" />
            <div class="space-y-2">
                <svg class="mx-auto h-10 w-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
                <button type="button" @click="$refs.mergeInput.click()"
                        class="px-4 py-2 bg-navy-600 text-white rounded-lg hover:bg-navy-700 transition-colors text-sm font-medium">
                    Select PDFs
                </button>
                <p class="text-xs text-gray-500 dark:text-gray-400">or drag & drop multiple files</p>
            </div>
        </div>
    </form>

    <!-- Merge button -->
    <div id="merge-action" class="hidden">
        <button hx-post="/api/merge/execute"
                hx-include="#merge-session-ids"
                hx-indicator="#loading"
                class="w-full px-4 py-3 bg-gold-500 hover:bg-gold-600 text-white rounded-lg font-semibold text-sm transition-colors">
            Merge All PDFs
        </button>
    </div>

    <a href="/" class="block text-center text-sm text-navy-500 hover:text-navy-600 dark:text-navy-400 mt-4">
        &larr; Back to Home
    </a>
</div>
{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-200 mb-6">Merge PDFs</h1>

    <!-- File list (updated by HTMX) -->
    <div id="merge-files" class="space-y-3">
        <div class="text-center py-12 text-gray-400 dark:text-gray-500">
            <svg class="mx-auto h-16 w-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p class="text-lg">No files uploaded yet</p>
            <p class="text-sm mt-1">Upload PDFs from the sidebar to get started</p>
        </div>
    </div>
</div>
{% endblock %}
