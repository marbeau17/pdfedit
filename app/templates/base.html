<!DOCTYPE html>
<html lang="ja"
      x-data="{ darkMode: localStorage.getItem('dark') === 'true' }"
      :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PDF Workshop Pro{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        navy: '#1C3058',
                        gold: '#CFAE70',
                    }
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>

    <!-- Sortable.js -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

    <!-- Alpine.js (defer) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        /* HTMX indicator: hidden by default, visible during requests */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            display: block;
        }

        /* Sortable ghost element */
        .sortable-ghost {
            opacity: 0.4;
        }

        /* Page card hover effects */
        .page-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .page-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
    </style>

    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

    <!-- Loading indicator bar (top) -->
    <div id="loading"
         class="htmx-indicator fixed top-0 left-0 w-full z-50">
        <div class="h-1 bg-gold animate-pulse"></div>
    </div>

    <!-- Header -->
    <header class="bg-navy text-white shadow-lg relative z-40">
        <div class="flex items-center justify-between px-6 py-3">
            <div class="flex items-center space-x-3">
                <svg class="w-8 h-8 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <h1 class="text-xl font-bold tracking-wide">PDF Workshop Pro</h1>
            </div>
            <div class="flex items-center space-x-4">
                {% block header_actions %}{% endblock %}
                <!-- Dark mode toggle -->
                <button @click="darkMode = !darkMode; localStorage.setItem('dark', darkMode)"
                        class="p-2 rounded-lg hover:bg-white/10 transition-colors"
                        :title="darkMode ? 'Light Mode' : 'Dark Mode'">
                    <svg x-show="!darkMode" class="w-5 h-5 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                    <svg x-show="darkMode" class="w-5 h-5 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main layout -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 overflow-y-auto flex-shrink-0">
            {% block sidebar %}{% endblock %}
        </aside>

        <!-- Content area -->
        <main class="flex-1 overflow-y-auto p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Toast notifications container -->
    <div id="toast-container"
         class="fixed bottom-4 right-4 z-50 flex flex-col space-y-2">
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
