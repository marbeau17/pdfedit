<!DOCTYPE html>
<html lang="ja"
      x-data="{ darkMode: localStorage.getItem('dark') === 'true' }"
      :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PDF Workshop Pro{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        navy: {
                            DEFAULT: '#1C3058',
                            600: '#162848',
                        },
                        gold: '#CFAE70',
                    }
                }
            }
        }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>

    <!-- Sortable.js -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

    <!-- Alpine.js (defer) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

    <!-- PDF.js v2.16.105: worker BEFORE main = runs in main thread (no Web Worker needed) -->
    <script src="/static/js/pdf.worker.min.js?v=20260401c"></script>
    <script src="/static/js/pdf.min.js?v=20260401c"></script>

    <!-- pdf-lib -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <!-- Dexie.js (IndexedDB wrapper) -->
    <script src="https://unpkg.com/dexie@4.0.11/dist/dexie.min.js"></script>

    <!-- Custom JS (local-first modules) -->
    <script src="/static/js/pdf-engine.js?v=20260401c"></script>
    <script src="/static/js/storage.js?v=20260401c"></script>
    <script src="/static/js/editor.js?v=20260401c"></script>
    <script src="/static/js/xml-editor.js?v=20260401c"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        /* HTMX indicator: hidden by default, visible during requests */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            display: block;
        }

        /* Sortable ghost element */
        .sortable-ghost {
            opacity: 0.4;
        }

        /* Page card hover effects */
        .page-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .page-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        /* Focus-visible ring for keyboard navigation */
        *:focus-visible {
            outline: 2px solid #CFAE70;
            outline-offset: 2px;
            border-radius: 2px;
        }

        /* Touch-friendly minimum target sizes */
        button, a, [role="button"], input[type="checkbox"], input[type="radio"], select {
            min-height: 44px;
            min-width: 44px;
        }
        /* Exempt inline text links and icon-only elements that size themselves */
        .sr-only, [class*="htmx-indicator"] {
            min-height: unset;
            min-width: unset;
        }
    </style>

    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

    <!-- Skip to content (accessibility) -->
    <a href="#main-content"
       class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-[100] focus:px-4 focus:py-2 focus:bg-navy-600 focus:text-white focus:rounded">
        Skip to content
    </a>

    <!-- Loading indicator bar (top) -->
    <div id="loading"
         class="htmx-indicator fixed top-0 left-0 w-full z-50">
        <div class="h-1 bg-gold animate-pulse"></div>
    </div>

    <!-- Header -->
    <header role="banner" class="bg-navy text-white shadow-lg relative z-40">
        <div class="flex items-center justify-between px-4 md:px-6 py-3">
            <div class="flex items-center space-x-3">
                <!-- Hamburger menu (mobile only) -->
                <button @click="$dispatch('toggle-sidebar')"
                        class="md:hidden p-2 min-h-[44px] min-w-[44px] flex items-center justify-center text-white rounded-lg hover:bg-white/10 transition-colors"
                        aria-label="Toggle sidebar menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <svg class="w-8 h-8 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <h1 class="text-lg md:text-xl font-bold tracking-wide">PDF Workshop Pro</h1>
                <!-- Privacy badge -->
                <span class="hidden md:inline-flex items-center gap-1 text-xs text-green-300 bg-green-900/30 px-2 py-1 rounded-full">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                    Local Processing
                </span>
            </div>
            <div class="flex items-center space-x-2 md:space-x-4">
                {% block header_actions %}{% endblock %}
                <!-- Dark mode toggle -->
                <button @click="darkMode = !darkMode; localStorage.setItem('dark', darkMode)"
                        class="p-2 min-h-[44px] min-w-[44px] flex items-center justify-center rounded-lg hover:bg-white/10 transition-colors"
                        :title="darkMode ? 'Light Mode' : 'Dark Mode'"
                        aria-label="Toggle dark mode">
                    <svg x-show="!darkMode" class="w-5 h-5 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                    <svg x-show="darkMode" class="w-5 h-5 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main layout with responsive sidebar -->
    <div x-data="{ sidebarOpen: false }"
         @toggle-sidebar.window="sidebarOpen = !sidebarOpen"
         @keydown.escape.window="sidebarOpen = false"
         class="flex flex-1 overflow-hidden">

        <!-- Backdrop (mobile only) -->
        <div x-show="sidebarOpen"
             x-transition:enter="transition-opacity ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition-opacity ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             @click="sidebarOpen = false"
             class="fixed inset-0 bg-black/50 z-40 md:hidden"
             aria-hidden="true">
        </div>

        <!-- Sidebar -->
        <aside role="navigation"
               aria-label="Sidebar navigation"
               :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
               class="fixed md:static md:translate-x-0 top-0 left-0 z-50 md:z-auto w-72 h-full md:h-auto bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 overflow-y-auto flex-shrink-0 transition-transform duration-300 md:transition-none">
            <!-- Mobile sidebar close button -->
            <div class="md:hidden flex justify-end p-2">
                <button @click="sidebarOpen = false"
                        class="p-2 min-h-[44px] min-w-[44px] flex items-center justify-center rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                        aria-label="Close sidebar">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            {% block sidebar %}{% endblock %}
        </aside>

        <!-- Content area -->
        <main role="main" id="main-content" class="flex-1 overflow-y-auto p-4 md:p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Toast notifications container -->
    <div id="toast-container"
         class="fixed bottom-4 right-4 z-50 flex flex-col space-y-2">
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
