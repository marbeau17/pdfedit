<div id="sortable-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    {% for page_num in pages %}
    {% include "fragments/page_card.html" %}
    {% endfor %}
</div>

{% if pages|length == 0 %}
<div class="flex flex-col items-center justify-center py-16 text-gray-400 dark:text-gray-500">
    <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    <p class="text-lg font-medium">ページがありません</p>
    <p class="text-sm mt-1">すべてのページが削除されました</p>
</div>
{% endif %}

<script>
    // Initialize Sortable.js on the grid for drag-and-drop reordering
    (function() {
        var grid = document.getElementById('sortable-grid');
        if (!grid) return;

        new Sortable(grid, {
            animation: 200,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            dragClass: 'sortable-drag',
            handle: '.page-card',
            onEnd: function(evt) {
                // Collect new page order from data attributes
                var items = grid.querySelectorAll('[data-page-num]');
                var newOrder = [];
                items.forEach(function(item) {
                    newOrder.push(parseInt(item.getAttribute('data-page-num')));
                });

                // POST new order to server via htmx
                htmx.ajax('POST', '/api/pages/reorder', {
                    target: '#preview-grid',
                    swap: 'innerHTML',
                    values: {
                        'session_id': '{{ session_id }}',
                        'order': JSON.stringify(newOrder)
                    }
                });
            }
        });
    })();
</script>
