<div role="status" aria-live="polite" class="rounded-lg p-4 mb-4 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800">
    <h4 class="font-semibold text-sm mb-2 text-green-800 dark:text-green-300">Watermark Removed</h4>
    <div class="text-xs text-gray-600 dark:text-gray-400 space-y-1">
        <p>Processed {{ page_count }} pages</p>
        <p>Area: {{ margin_x }}x{{ margin_y }}px (bottom-right)</p>
        {% if special_pages %}
        <p>Special pages: {{ special_pages|join(', ') }}</p>
        {% endif %}
    </div>
</div>
<!-- Also trigger preview grid refresh -->
<div hx-get="/api/preview/{{ session_id }}/1" hx-trigger="load" hx-swap="none"></div>
