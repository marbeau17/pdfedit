<div class="space-y-4" aria-live="polite">
    <!-- Summary -->
    <div class="rounded-lg p-4 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800">
        <h4 class="font-semibold text-sm text-blue-800 dark:text-blue-300 mb-1">Analysis Complete</h4>
        <p class="text-xs text-gray-600 dark:text-gray-400">
            Analyzed: {{ total_analyzed }} pages | Failed: {{ total_failed }} pages
        </p>
    </div>

    <!-- Per-page results -->
    {% for item in results %}
    {% if item.success %}
    <div class="rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
        <div class="bg-gray-50 dark:bg-gray-800 px-4 py-2 flex justify-between items-center">
            <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">Page {{ item.page_num }}</span>
            <div class="flex gap-2">
                <button hx-post="/api/ai/save-xml"
                        hx-include="[name='xml_{{ item.page_num }}'], [name='session_id_ai'], [name='api_key_ai']"
                        hx-vals='{"page_num": {{ item.page_num }}}'
                        hx-target="#ai-status-{{ item.page_num }}"
                        hx-swap="innerHTML"
                        aria-label="Save XML for page {{ item.page_num }}"
                        class="px-2 py-1 text-xs bg-navy-600 text-white rounded hover:bg-navy-700 transition-colors">
                    Save XML
                </button>
                <button hx-post="/api/ai/generate"
                        hx-include="[name='xml_{{ item.page_num }}'], [name='session_id_ai'], [name='api_key_ai']"
                        hx-vals='{"page_num": {{ item.page_num }}}'
                        hx-target="#ai-gen-{{ item.page_num }}"
                        hx-swap="innerHTML"
                        hx-indicator="#loading"
                        aria-label="Generate image for page {{ item.page_num }}"
                        class="px-2 py-1 text-xs bg-gold-500 text-white rounded hover:bg-gold-600 transition-colors">
                    Generate Image
                </button>
                <button hx-post="/api/ai/apply"
                        hx-vals='{"session_id": "{{ session_id }}", "page_num": {{ item.page_num }}}'
                        hx-target="#preview-grid"
                        hx-swap="innerHTML"
                        hx-indicator="#loading"
                        aria-label="Apply generated content to page {{ item.page_num }} in PDF"
                        class="px-2 py-1 text-xs bg-green-600 text-white rounded hover:bg-green-700 transition-colors">
                    Apply to PDF
                </button>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-0">
            <!-- Original image -->
            <div class="p-2 md:border-r border-b md:border-b-0 border-gray-200 dark:border-gray-700">
                <p class="text-xs text-gray-500 mb-1">Original</p>
                <img src="/api/preview/{{ session_id }}/{{ item.page_num }}"
                     class="w-full rounded shadow-sm" loading="lazy" alt="Original page {{ item.page_num }}" />
            </div>
            <!-- XML editor + generated preview -->
            <div class="p-2">
                <label for="xml-editor-{{ item.page_num }}" class="text-xs text-gray-500 mb-1 block">XML Structure</label>
                <textarea id="xml-editor-{{ item.page_num }}" name="xml_{{ item.page_num }}"
                          class="w-full h-48 text-xs font-mono bg-gray-900 text-green-400 rounded p-2 border border-gray-700 resize-y"
                          aria-label="XML structure for page {{ item.page_num }}"
                          >{{ item.xml }}</textarea>
                <div id="ai-status-{{ item.page_num }}" class="mt-1"></div>
                <div id="ai-gen-{{ item.page_num }}" class="mt-2"></div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="rounded-lg p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800">
        <span class="text-sm text-red-700 dark:text-red-400">Page {{ item.page_num }}: Analysis failed</span>
    </div>
    {% endif %}
    {% endfor %}
</div>
